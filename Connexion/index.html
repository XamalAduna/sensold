



<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopX</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
html{overflow-x:hidden;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;max-width:100%;}
body{background:#f7f7f7;color:#333;overflow-x:hidden;}
header{background:#ffffff;color:#222;padding:18px 8%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.07);border-bottom:3px solid #ff6600;}
.logo{font-size:30px;font-weight:700;color:#ff6600;letter-spacing:.5px;}
nav a{color:#222;text-decoration:none;margin-left:25px;}
.cart-icon{position:relative;cursor:pointer;color:#222;font-size:24px;margin-left:25px;background:#f7f7f7;border:none;padding:10px 14px;border-radius:50px;transition:.25s;display:flex;align-items:center;gap:8px;}
.cart-icon:hover{background:#fff0e6;transform:translateY(-2px);}
.cart-badge{position:absolute;top:-8px;right:-8px;background:#ff6600;color:white;border-radius:50%;width:18px;height:18px;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:bold;}
.material-icons{font-size:24px;vertical-align:middle;}
.hero{height:80vh;background:linear-gradient(135deg,rgba(20,10,5,.55),rgba(255,102,0,.35)),url("https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=1500&q=80");background-size:cover;background-position:center;display:flex;justify-content:center;align-items:center;flex-direction:column;color:white;text-align:center;}
.hero h1{font-size:64px;font-weight:700;margin-bottom:18px;text-shadow:0 4px 25px rgba(0,0,0,.4);letter-spacing:-1px;}
.hero p{font-size:21px;margin-bottom:34px;opacity:.95;text-shadow:0 2px 10px rgba(0,0,0,.3);}
.btn{background:linear-gradient(135deg,#ff7a1a,#ff5500);padding:16px 40px;color:white;text-decoration:none;border-radius:50px;font-weight:bold;transition:.3s;cursor:pointer;border:none;font-size:16px;box-shadow:0 8px 22px rgba(255,85,0,.35);}
.btn:hover{background:linear-gradient(135deg,#ff5500,#e64500);transform:translateY(-3px);box-shadow:0 12px 28px rgba(255,85,0,.45);}
.container{width:90%;max-width:1200px;margin:60px auto;}
.title{text-align:center;font-size:42px;font-weight:700;margin-bottom:50px;position:relative;}
.title::after{content:'';display:block;width:70px;height:4px;background:linear-gradient(90deg,#ff7a1a,#ff5500);border-radius:4px;margin:14px auto 0;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px;}
.card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.08);transition:.35s;}
.card:hover{transform:translateY(-10px);box-shadow:0 20px 40px rgba(0,0,0,.14);}
.content{padding:22px;}
.content h3{margin-bottom:10px;font-size:18px;font-weight:600;}
.price{font-size:26px;font-weight:bold;color:#ff6600;margin:15px 0;}
.card-buttons{display:flex;gap:10px;}
.btn-detail{flex:1;padding:12px;border:2px solid #111;background:white;color:#111;border-radius:10px;cursor:pointer;font-size:14px;transition:.25s;font-family:Poppins,sans-serif;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-detail:hover{background:#111;color:white;}
.btn-cart{flex:1;padding:12px;border:none;background:linear-gradient(135deg,#222,#111);color:white;border-radius:10px;cursor:pointer;font-size:14px;transition:.25s;font-family:Poppins,sans-serif;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-cart:hover{background:linear-gradient(135deg,#ff7a1a,#ff5500);transform:translateY(-2px);}
footer{background:#fff;color:#666;text-align:center;padding:30px;margin-top:80px;border-top:1px solid #eee;}

/* CAROUSEL CARTE */
.card-carousel{position:relative;width:100%;height:250px;overflow:hidden;background:#eee;}
.card-carousel-track{display:flex;height:100%;transition:transform .35s ease;}
.card-carousel-track img{min-width:100%;height:100%;object-fit:cover;flex-shrink:0;}
.card-carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.45);color:white;border:none;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center;transition:.2s;}
.card-carousel-btn:hover{background:rgba(255,102,0,.85);}
.card-carousel-btn.prev{left:8px;}
.card-carousel-btn.next{right:8px;}
.card-carousel-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.card-carousel-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5);border:none;cursor:pointer;padding:0;transition:.2s;}
.card-carousel-dot.active{background:white;}

/* MODAL PRODUIT */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:white;border-radius:20px;max-width:800px;width:90%;max-height:90vh;overflow-y:auto;position:relative;padding:0;}
.modal-close{position:absolute;top:15px;right:20px;font-size:28px;cursor:pointer;color:#666;z-index:10;background:none;border:none;font-family:Poppins,sans-serif;}
.modal-close:hover{color:#ff6600;}

/* CAROUSEL MODAL */
.carousel{position:relative;width:100%;height:350px;overflow:hidden;border-radius:20px 20px 0 0;background:#eee;}
.carousel-track{display:flex;height:100%;transition:transform .4s ease;}
.carousel-track img{min-width:100%;height:100%;object-fit:cover;flex-shrink:0;}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);color:white;border:none;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center;transition:.2s;}
.carousel-btn:hover{background:rgba(255,102,0,.85);}
.carousel-btn.prev{left:12px;}
.carousel-btn.next{right:12px;}
.carousel-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:7px;}
.carousel-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.5);border:none;cursor:pointer;transition:.2s;padding:0;}
.carousel-dot.active{background:white;}

.modal-img-placeholder{width:100%;height:350px;background:#eee;border-radius:20px 20px 0 0;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:30px;}
.modal-body h2{font-size:28px;margin-bottom:10px;}
.modal-price{font-size:32px;font-weight:bold;color:#ff6600;margin-bottom:20px;}
.modal-desc{color:#666;line-height:1.8;margin-bottom:20px;}
.modal-details{background:#f7f7f7;border-radius:10px;padding:20px;margin-bottom:25px;}
.modal-details h4{font-size:16px;margin-bottom:12px;color:#333;}
.modal-details ul{list-style:none;padding:0;}
.modal-details ul li{padding:6px 0;border-bottom:1px solid #eee;font-size:14px;color:#555;}
.modal-details ul li:last-child{border-bottom:none;}
.modal-details ul li span{font-weight:600;color:#333;margin-right:8px;}
.modal-btn-cart{width:100%;padding:16px;border:none;background:linear-gradient(135deg,#222,#111);color:white;border-radius:12px;cursor:pointer;font-size:18px;font-weight:600;transition:.3s;font-family:Poppins,sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.modal-btn-cart:hover{background:linear-gradient(135deg,#ff7a1a,#ff5500);transform:translateY(-2px);}

/* PAGE PANIER */
#page-shop,#page-cart,#page-checkout{display:block;}
#page-cart,#page-checkout{display:none;}
.page-title{font-size:36px;text-align:center;margin-bottom:40px;}
.cart-empty{text-align:center;padding:60px;color:#999;font-size:18px;}
.cart-items{display:flex;flex-direction:column;gap:20px;margin-bottom:40px;}
.cart-item{background:white;border-radius:15px;padding:20px;display:flex;align-items:center;gap:20px;box-shadow:0 4px 15px rgba(0,0,0,.08);}
.cart-item-img{width:80px;height:80px;object-fit:cover;border-radius:10px;}
.cart-item-img-placeholder{width:80px;height:80px;background:#eee;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cart-item-info{flex:1;}
.cart-item-info h4{font-size:16px;margin-bottom:5px;}
.cart-item-info .item-price{color:#ff6600;font-weight:bold;font-size:18px;}
.cart-item-qty{display:flex;align-items:center;gap:10px;}
.qty-btn{width:30px;height:30px;border:1px solid #ddd;background:white;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.qty-btn:hover{background:#ff6600;color:white;border-color:#ff6600;}
.cart-item-total{font-weight:700;font-size:18px;min-width:70px;text-align:right;}
.remove-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:20px;padding:5px;}
.remove-btn:hover{color:#ff4400;}
.cart-summary{background:white;border-radius:15px;padding:30px;box-shadow:0 4px 15px rgba(0,0,0,.08);}
.cart-summary h3{font-size:22px;margin-bottom:20px;}
.summary-line{display:flex;justify-content:space-between;margin-bottom:12px;font-size:15px;}
.summary-line.total{font-size:20px;font-weight:700;border-top:2px solid #eee;padding-top:15px;margin-top:10px;}
.cart-actions{display:flex;gap:15px;margin-top:25px;flex-wrap:wrap;}
.btn-secondary{padding:14px 30px;border:2px solid #111;background:white;color:#111;border-radius:50px;cursor:pointer;font-size:15px;font-weight:600;font-family:Poppins,sans-serif;transition:.3s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-secondary:hover{background:#111;color:white;transform:translateY(-2px);}

/* PAGE COMMANDE */
.checkout-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
@media(max-width:700px){.checkout-grid{grid-template-columns:1fr;}}
.checkout-form{background:white;border-radius:15px;padding:30px;box-shadow:0 4px 15px rgba(0,0,0,.08);}
.checkout-form h3{font-size:20px;margin-bottom:25px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;margin-bottom:6px;font-size:14px;font-weight:600;color:#555;}
.form-group label .required{color:#ff0000;margin-left:3px;}
.form-group input,.form-group select{width:100%;padding:12px 15px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:Poppins,sans-serif;outline:none;transition:.2s;}
.form-group input:focus,.form-group select:focus{border-color:#ff6600;}
.form-group input.error,.form-group select.error{border-color:#ff0000;background:#fff5f5;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.order-recap{background:white;border-radius:15px;padding:30px;box-shadow:0 4px 15px rgba(0,0,0,.08);height:fit-content;}
.order-recap h3{font-size:20px;margin-bottom:20px;}
.recap-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px;}
.recap-item:last-child{border-bottom:none;}
.confirm-btn{width:100%;margin-top:20px;}
.success-screen{text-align:center;padding:80px 30px;}
.success-screen .check{font-size:80px;margin-bottom:20px;}
.success-screen h2{font-size:32px;margin-bottom:15px;color:#27ae60;}
.success-screen p{color:#666;margin-bottom:30px;font-size:16px;}
.error-message{color:#ff0000;font-size:13px;margin-top:5px;display:none;}
.error-message.show{display:block;}

/* RESPONSIVE MOBILE */
@media(max-width:600px){
  header{padding:15px 5%;}
  .logo{font-size:22px;}
  .hero{height:60vh;padding:0 20px;}
  .hero h1{font-size:32px;}
  .hero p{font-size:16px;}
  .btn{padding:12px 24px;font-size:14px;}
  .container{width:92%;margin:35px auto;}
  .title{font-size:28px;margin-bottom:25px;}
  .page-title{font-size:26px;margin-bottom:25px;}
  .products{grid-template-columns:1fr;gap:20px;}
  .card-carousel{height:200px;}
  .modal{width:95%;max-height:95vh;}
  .carousel{height:220px;}
  .modal-body{padding:20px;}
  .modal-body h2{font-size:22px;}
  .modal-price{font-size:24px;}
  .form-row{grid-template-columns:1fr;gap:0;}
  .cart-item{flex-wrap:wrap;padding:15px;gap:12px;}
  .cart-item-info{min-width:120px;}
  .cart-item-total{text-align:left;}
  .checkout-form,.order-recap{padding:20px;}
  .cart-summary{padding:20px;}
  .cart-actions{flex-direction:column;}
  .cart-actions button{width:100%;}
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="showPage('shop')" style="cursor:pointer">ShopX</div>
  <nav>
    <button class="cart-icon" onclick="showPage('cart')" title="Panier">
      <span class="material-icons">shopping_cart</span>
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </nav>
</header>

<!-- PAGE BOUTIQUE -->
<div id="page-shop">
  <section class="hero">
    <h1>Nouvelle Collection</h1>
    <p>Des produits élégants à des prix imbattables.</p>
    <a class="btn" href="#"><span class="material-icons">shopping_bag</span> Acheter maintenant</a>
  </section>
  <div class="container">
    <h2 class="title">Nos Produits</h2>
    <div class="products" id="products-grid"></div>
  </div>
</div>

<!-- PAGE PANIER -->
<div id="page-cart">
  <div class="container">
    <h2 class="page-title"><span class="material-icons" style="font-size:32px;vertical-align:middle;">shopping_cart</span> Mon Panier</h2>
    <div id="cart-content"></div>
  </div>
</div>

<!-- PAGE COMMANDE -->
<div id="page-checkout">
  <div class="container">
    <h2 class="page-title"><span class="material-icons" style="font-size:32px;vertical-align:middle;">edit_note</span> Finaliser la commande</h2>
    <div id="checkout-content"></div>
  </div>
</div>

<!-- MODAL DÉTAIL PRODUIT -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modal-inner"></div>
  </div>
</div>

<footer>
  <p>© 2026 ShopX - Tous droits réservés.</p>
</footer>

// ── ÉTAT PANIER ──
let cart = [];
// état carousel par carte : { [productId]: currentSlide }
const cardSlides = {};

function getCartCount(){return cart.reduce((s,i)=>s+i.qty,0);}
function getCartTotal(){return cart.reduce((s,i)=>s+i.price*i.qty,0);}
function updateBadge(){document.getElementById('cart-badge').textContent=getCartCount();}

function addToCart(id){
  const p=products.find(x=>x.id===id);
  const existing=cart.find(x=>x.id===id);
  if(existing) existing.qty++;
  else cart.push({...p, qty:1});
  updateBadge();
  const b=document.getElementById('cart-badge');
  b.style.transform='scale(1.5)';b.style.background='#27ae60';
  setTimeout(()=>{b.style.transform='scale(1)';b.style.background='#ff6600';},300);
}

// ── CAROUSEL CARTE ──
function slideCard(productId, dir, event){
  event.stopPropagation();
  const p = products.find(x=>x.id===productId);
  const total = p.gallery.length;
  cardSlides[productId] = ((cardSlides[productId]||0) + dir + total) % total;
  updateCardCarousel(productId);
}
function goToCardSlide(productId, i, event){
  event.stopPropagation();
  cardSlides[productId] = i;
  updateCardCarousel(productId);
}
function updateCardCarousel(productId){
  const slide = cardSlides[productId] || 0;
  const track = document.getElementById('card-track-'+productId);
  if(track) track.style.transform = `translateX(-${slide*100}%)`;
  document.querySelectorAll('#card-dots-'+productId+' .card-carousel-dot').forEach((d,i)=>{
    d.classList.toggle('active', i===slide);
  });
}

// ── RENDU PRODUITS ──
function renderProducts(){
  const grid=document.getElementById('products-grid');
  grid.innerHTML=products.map(p=>{
    const slides = p.gallery.map(src=>`<img src="${src}" alt="${p.name}">`).join('');
    const dots = p.gallery.map((_,i)=>`<button class="card-carousel-dot${i===0?' active':''}" onclick="goToCardSlide(${p.id},${i},event)"></button>`).join('');
    return `
    <div class="card">
      <div class="card-carousel">
        <div class="card-carousel-track" id="card-track-${p.id}">${slides}</div>
        <button class="card-carousel-btn prev" onclick="slideCard(${p.id},-1,event)">&#8592;</button>
        <button class="card-carousel-btn next" onclick="slideCard(${p.id},1,event)">&#8594;</button>
        <div class="card-carousel-dots" id="card-dots-${p.id}">${dots}</div>
      </div>
      <div class="content">
        <h3>${p.name}</h3>
        <div class="price">${p.price} €</div>
        <div class="card-buttons">
          <button class="btn-detail" onclick="openModal(${p.id})"><span class="material-icons">visibility</span> Voir</button>
          <button class="btn-cart" onclick="addToCart(${p.id});this.innerHTML='<span class=\\'material-icons\\'>check</span> Ajouté';setTimeout(()=>this.innerHTML='<span class=\\'material-icons\\'>add_shopping_cart</span> Ajouter',1200)"><span class="material-icons">add_shopping_cart</span> Ajouter</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── CAROUSEL MODAL ──
let currentSlide = 0;
let currentGallery = [];

function buildCarousel(gallery) {
  currentGallery = gallery;
  currentSlide = 0;
  const slides = gallery.map(src=>`<img src="${src}" alt="">`).join('');
  const dots = gallery.map((_,i)=>`<button class="carousel-dot${i===0?' active':''}" onclick="goToSlide(${i})"></button>`).join('');
  return `
    <div class="carousel" id="carousel">
      <div class="carousel-track" id="carousel-track">${slides}</div>
      <button class="carousel-btn prev" onclick="slideCarousel(-1)">&#8592;</button>
      <button class="carousel-btn next" onclick="slideCarousel(1)">&#8594;</button>
      <div class="carousel-dots">${dots}</div>
    </div>
  `;
}
function slideCarousel(dir){
  currentSlide=(currentSlide+dir+currentGallery.length)%currentGallery.length;
  updateCarousel();
}
function goToSlide(i){
  currentSlide=i;
  updateCarousel();
}
function updateCarousel(){
  document.getElementById('carousel-track').style.transform=`translateX(-${currentSlide*100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d,i)=>d.classList.toggle('active',i===currentSlide));
}

// ── MODAL ──
function openModal(id){
  const p=products.find(x=>x.id===id);
  document.getElementById('modal-inner').innerHTML=`
    ${buildCarousel(p.gallery)}
    <div class="modal-body">
      <h2>${p.name}</h2>
      <div class="modal-price">${p.price} €</div>
      <p class="modal-desc">${p.desc}</p>
      <div class="modal-details">
        <h4><span class="material-icons" style="font-size:20px;vertical-align:middle;">list</span> Caractéristiques</h4>
        <ul>${p.details.map(d=>`<li><span>${d.label} :</span>${d.val}</li>`).join('')}</ul>
      </div>
      <button class="modal-btn-cart" onclick="addToCart(${p.id});this.innerHTML='<span class=\\'material-icons\\'>check</span> Ajouté au panier';this.style.background='#27ae60'"><span class="material-icons">add_shopping_cart</span> Ajouter au panier</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect();}
function closeModalDirect(){
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow='';
}

// ── NAVIGATION PAGES ──
function showPage(page){
  document.getElementById('page-shop').style.display='none';
  document.getElementById('page-cart').style.display='none';
  document.getElementById('page-checkout').style.display='none';
  if(page==='shop') document.getElementById('page-shop').style.display='block';
  else if(page==='cart'){document.getElementById('page-cart').style.display='block';renderCart();}
  else if(page==='checkout'){document.getElementById('page-checkout').style.display='block';renderCheckout();}
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── PAGE PANIER ──
function renderCart(){
  const el=document.getElementById('cart-content');
  if(cart.length===0){
    el.innerHTML=`<div class="cart-empty"><span class="material-icons" style="font-size:48px;display:block;margin-bottom:15px;">shopping_cart</span>Votre panier est vide.<br><br><button class="btn" onclick="showPage('shop')"><span class="material-icons">arrow_back</span> Continuer les achats</button></div>`;
    return;
  }
  const items=cart.map((item)=>`
    <div class="cart-item">
      <img class="cart-item-img" src="${item.img}" alt="${item.name}">
      <div class="cart-item-info">
        <h4>${item.name}</h4>
        <div class="item-price">${item.price} €</div>
      </div>
      <div class="cart-item-qty">
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
        <span>${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
      </div>
      <div class="cart-item-total">${(item.price*item.qty)} €</div>
      <button class="remove-btn" onclick="removeFromCart(${item.id})"><span class="material-icons">delete</span></button>
    </div>
  `).join('');
  const livraison=cart.length>0?9.99:0;
  const total=getCartTotal();
  el.innerHTML=`
    <div class="cart-items">${items}</div>
    <div class="cart-summary">
      <h3>Récapitulatif</h3>
      <div class="summary-line"><span>Sous-total</span><span>${total.toFixed(2)} €</span></div>
      <div class="summary-line"><span>Livraison</span><span>${livraison.toFixed(2)} €</span></div>
      <div class="summary-line total"><span>Total</span><span>${(total+livraison).toFixed(2)} €</span></div>
      <div class="cart-actions">
        <button class="btn-secondary" onclick="showPage('shop')"><span class="material-icons">arrow_back</span> Continuer</button>
        <button class="btn" onclick="showPage('checkout')">Commander <span class="material-icons">arrow_forward</span></button>
      </div>
    </div>
  `;
}
function changeQty(id,delta){
  const item=cart.find(x=>x.id===id);
  if(!item)return;
  item.qty+=delta;
  if(item.qty<=0) cart=cart.filter(x=>x.id!==id);
  updateBadge();renderCart();
}
function removeFromCart(id){
  cart=cart.filter(x=>x.id!==id);
  updateBadge();renderCart();
}

// ── VALIDATION ET CONFIRMATION ──
function validateOrder() {
  let isValid = true;
  
  // Clear previous errors
  document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.form-group input, .form-group select').forEach(el => el.classList.remove('error'));
  
  // Check required fields
  const fields = {
    'prenom': 'Prénom',
    'nom': 'Nom',
    'telephone': 'Téléphone principal',
    'departement': 'Département',
    'commune': 'Commune',
    'quartier': 'Quartier',
    'adresse_complete': 'Adresse complète'
  };
  
  for (const [id, label] of Object.entries(fields)) {
    const el = document.getElementById(id);
    const errorEl = document.getElementById(id + '-error');
    if (!el.value.trim()) {
      el.classList.add('error');
      errorEl.classList.add('show');
      isValid = false;
    }
  }
  
  // Validate telephone (only digits)
  const telEl = document.getElementById('telephone');
  const telError = document.getElementById('telephone-error');
  const telValue = telEl.value.replace(/\s/g, '');
  if (telValue && !/^\d+$/.test(telValue)) {
    telEl.classList.add('error');
    telError.textContent = 'Le numéro de téléphone doit contenir uniquement des chiffres';
    telError.classList.add('show');
    isValid = false;
  } else if (telValue && telValue.length < 9) {
    telEl.classList.add('error');
    telError.textContent = 'Veuillez entrer un numéro de téléphone valide (au moins 9 chiffres)';
    telError.classList.add('show');
    isValid = false;
  }
  
  // Validate secondary telephone (only digits if filled)
  const tel2El = document.getElementById('telephone2');
  const tel2Error = document.getElementById('telephone2-error');
  const tel2Value = tel2El.value.replace(/\s/g, '');
  if (tel2Value && !/^\d+$/.test(tel2Value)) {
    tel2El.classList.add('error');
    tel2Error.classList.add('show');
    isValid = false;
  }
  
  return isValid;
}

function confirmOrder(){
  if (!validateOrder()) {
    // Scroll to first error
    const firstError = document.querySelector('.form-group input.error, .form-group select.error');
    if (firstError) {
      firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
      firstError.focus();
    }
    return;
  }
  
  // Collect data
  const orderData = {
    prenom: document.getElementById('prenom').value.trim(),
    nom: document.getElementById('nom').value.trim(),
    telephone: document.getElementById('telephone').value.trim(),
    telephone_secondaire: document.getElementById('telephone2').value.trim() || null,
    departement: document.getElementById('departement').value,
    commune: document.getElementById('commune').value.trim(),
    quartier: document.getElementById('quartier').value.trim(),
    adresse_complete: document.getElementById('adresse_complete').value.trim(),
    produits: cart.map(item => ({
      id: item.id,
      nom: item.name,
      prix: item.price,
      quantite: item.qty
    })),
    total: getCartTotal() + (cart.length > 0 ? 9.99 : 0),
    date_commande: new Date().toISOString()
  };
  
  // Save to Firebase
  db.collection("annonces").add(orderData)
    .then((docRef) => {
      console.log("Commande enregistrée avec ID: ", docRef.id);
      
      // Clear cart and show success
      cart = [];
      updateBadge();
      document.getElementById('checkout-content').innerHTML=`
        <div class="success-screen">
          <div class="check">✅</div>
          <h2>Commande confirmée !</h2>
          <p>Merci pour votre achat. Votre commande a été enregistrée avec succès.<br>Numéro de commande : <strong>#${docRef.id.slice(0,8)}</strong></p>
          <p style="margin-top:10px;font-size:14px;color:#888;">Livraison estimée : <strong>3 à 5 jours ouvrés</strong> dans la région de Dakar.</p>
          <button class="btn" onclick="showPage('shop')"><span class="material-icons">store</span> Retour à la boutique</button>
        </div>
      `;
    })
    .catch((error) => {
      console.error("Erreur lors de l'enregistrement: ", error);
      alert("Une erreur est survenue lors de l'enregistrement de votre commande. Veuillez réessayer.");
    });
}
